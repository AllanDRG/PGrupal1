<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
</head>
<body>

    <header>
        <h1>Contáctanos</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Información de Contacto</h2>
            <p>Puedes contactarnos a través de los siguientes medios:</p>

            <ul>
                <li><strong>Email:</strong> info@example.com</li>
                <li><strong>Teléfono:</strong> +1 123 456 7890</li>
                <li><strong>Dirección:</strong> 123 Calle Principal, Ciudad, País</li>
            </ul>
        </section>

        <section>
            <h2>Formulario de Contacto</h2>
            <form action="/enviar_formulario" method="post">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="mensaje">Mensaje:</label><br>
                <textarea id="mensaje" name="mensaje" rows="4" cols="50" required></textarea><br><br>

                <input type="submit" value="Enviar">
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Mi Sitio Web</p>
    </footer>
<!--cambioDanilo-->
</body>
</html>
